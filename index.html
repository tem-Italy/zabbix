<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Mediaset Links</title>
    <style>
        body {
            background: linear-gradient(to bottom, #001f3f, #0074D9, #7FDBFF); /* Sfondo in stile Mediaset con sfumature di blu */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            text-align: center;
        }
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header h1 {
            font-size: 28px; /* Dimensione del testo */
            font-weight: normal; /* Normale */
            font-family: 'Gill Sans MT', sans-serif; /* Font carico */
            margin-bottom: 20px; /* Spazio sotto il testo */
        }
        .header img {
            width: 200px; /* Dimensione del logo intestazione */
            margin-bottom: 20px;
        }
        .logo-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .logo {
            width: 150px;
            height: 150px;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .logo:hover {
            transform: scale(1.15);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Accesso Riservato Portale Cliente</h1> <!-- Testo sopra il secondo logo -->
        <img src="logo-intestazione-2.png" alt="Intestazione 2"> <!-- Logo TEM sopra -->
        <img src="logo-intestazione.png" alt="Intestazione"> <!-- Logo Mediaset sotto -->
    </div>
    <div class="logo-container">
        <a href="https://docs.google.com/spreadsheets/d/16FyxYJm3RO0phGG2sZyqIDRk5rwSCyYsgI-z00GBCLo/edit?usp=sharing" target="_blank">
            <img src="logo1.png" alt="MONRADIO SRL" class="logo">
        </a>
        <a href="https://docs.google.com/spreadsheets/d/1Mp8iEFk5XT5cy0CkuZBvng7yqIe4uJ4QYjH4j-jYw9w/edit?usp=sharing" target="_blank">
            <img src="logo2.png" alt="RMC ITALIA SPA" class="logo">
        </a>
        <a href="https://docs.google.com/spreadsheets/d/1KDCROBTQjJjzX2XhKw216Gd8DvD44STWSwnGRN4F228/edit?usp=sharing" target="_blank">
            <img src="logo3.png" alt="RADIO STUDIO 105 S.P.A." class="logo">
        </a>
        <a href="https://docs.google.com/spreadsheets/d/1IWMGksi_NUu-9Jk-nz8mRqeC6uyKBmhncARZBIjgmcg/edit?usp=sharing" target="_blank">
            <img src="logo4.png" alt="RADIO SUBASIO SRL" class="logo">
        </a>
        <a href="https://docs.google.com/spreadsheets/d/1_8JNO8neq1hSiuU0MGJ5Toz9pzsiTSgcal5OD1Y8c48/edit?usp=sharing" target="_blank">
            <img src="logo5.png" alt="VIRGIN RADIO ITALY S.P.A." class="logo">
        </a>
    </div>
</body>
</html>
